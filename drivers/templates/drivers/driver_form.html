{% extends "base.html" %}

{% block title %}{% if driver %}Edit{% else %}Add{% endif %} Driver - Trucking Tracker{% endblock %}

{% block page_title %}{% if driver %}Edit Driver{% else %}Add Driver{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card p-6">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label" for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required
                           value="{{ driver.full_name|default:'' }}"
                           class="form-input" placeholder="e.g. Juan Dela Cruz">
                </div>
                <div>
                    <label class="form-label" for="contact_number">Contact Number</label>
                    <input type="text" id="contact_number" name="contact_number" required
                           value="{{ driver.contact_number|default:'' }}"
                           class="form-input" placeholder="e.g. 09171234567">
                </div>
                <div>
                    <label class="form-label" for="license_number">License Number</label>
                    <input type="text" id="license_number" name="license_number" required
                           value="{{ driver.license_number|default:'' }}"
                           class="form-input" placeholder="e.g. LIC-001">
                </div>
                <div>
                    <label class="form-label" for="license_expiry">License Expiry</label>
                    <input type="date" id="license_expiry" name="license_expiry" required
                           value="{{ driver.license_expiry|date:'Y-m-d'|default:'' }}"
                           class="form-input">
                </div>
                <div>
                    <label class="form-label" for="assigned_truck">Assigned Truck</label>
                    <select id="assigned_truck" name="assigned_truck" class="form-input">
                        <option value="">— Not Assigned —</option>
                        {% for truck in trucks %}
                        <option value="{{ truck.pk }}" {% if driver and driver.assigned_truck_id == truck.pk %}selected{% endif %}>
                            {{ truck.plate_number }} — {{ truck.get_truck_type_display }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="form-label" for="employment_status">Employment Status</label>
                    <select id="employment_status" name="employment_status" class="form-input">
                        {% for value, label in employment_statuses %}
                        <option value="{{ value }}" {% if driver and driver.employment_status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="form-label" for="emergency_contact_name">Emergency Contact Name</label>
                    <input type="text" id="emergency_contact_name" name="emergency_contact_name"
                           value="{{ driver.emergency_contact_name|default:'' }}"
                           class="form-input" placeholder="e.g. Maria Dela Cruz">
                </div>
                <div>
                    <label class="form-label" for="emergency_contact_number">Emergency Contact #</label>
                    <input type="text" id="emergency_contact_number" name="emergency_contact_number"
                           value="{{ driver.emergency_contact_number|default:'' }}"
                           class="form-input" placeholder="e.g. 09181234567">
                </div>
            </div>
            <div>
                <label class="form-label" for="address">Address</label>
                <textarea id="address" name="address" rows="2" class="form-input" placeholder="Complete address...">{{ driver.address|default:'' }}</textarea>
            </div>
            <div>
                <label class="form-label" for="remarks">Remarks</label>
                <textarea id="remarks" name="remarks" rows="2" class="form-input" placeholder="Additional notes...">{{ driver.remarks|default:'' }}</textarea>
            </div>
            <div class="border-t border-gray-200 pt-4">
                <h4 class="text-sm font-semibold text-[#541A1A] mb-3">Login Account</h4>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label" for="username">Username</label>
                        <input type="text" id="username" name="username" {% if driver %}disabled value="{{ driver.user.username }}"{% else %}required{% endif %} class="form-input {% if driver %}bg-gray-100{% endif %}" placeholder="e.g. juan.delacruz">
                    </div>
                    <div>
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" name="email" value="{{ driver.user.email|default:'' }}" class="form-input" placeholder="e.g. juan@example.com">
                    </div>
                    <div>
                        <label class="form-label" for="password">{% if driver %}New Password (leave blank to keep current){% else %}Password{% endif %}</label>
                        <input type="password" id="password" name="password" {% if not driver %}required{% endif %} class="form-input" placeholder="{% if driver %}Leave blank to keep current{% else %}Minimum 8 characters{% endif %}">
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-100">
                <a href="{% url 'driver_list' %}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">
                    {% if driver %}Update Driver{% else %}Add Driver{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
