<div class="p-6">
  <div class="flex items-center mb-6">
    <h3 class="text-xl font-bold text-[#541A1A]">Delete Truck</h3>
  </div>
  <div class="text-center py-4">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
    </div>
    <h3 class="text-lg font-semibold text-gray-800 mb-2">Are you sure?</h3>
    <p class="text-sm text-gray-500 mb-6">
      You are about to delete truck <strong class="text-gray-700">{{ truck.plate_number }}</strong>.
      This action cannot be undone.
    </p>
    <form hx-post="{% url action_url pk %}" hx-target="#modal-content" hx-swap="innerHTML">
      {% csrf_token %}
      <div class="flex items-center justify-center space-x-3">
        <button type="submit" class="btn-danger">Yes, Delete Truck</button>
      </div>
    </form>
  </div>
</div>
