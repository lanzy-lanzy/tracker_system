<div class="p-6" x-data="{ submitting: false }">
  <div class="flex items-center mb-6">
    <h3 class="text-xl font-bold text-[#541A1A]">{% if form_truck %}Edit{% else %}Add New{% endif %} Truck</h3>
  </div>
  {% if error %}<div class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm">{{ error }}</div>{% endif %}
  <form hx-post="{% if pk %}{% url action_url pk %}{% else %}{% url action_url %}{% endif %}" hx-target="#modal-content" hx-swap="innerHTML" @submit="submitting = true">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="plate_number">Plate Number</label>
        <input type="text" id="plate_number" name="plate_number" required value="{{ form_truck.plate_number|default:'' }}" class="form-input" placeholder="e.g. ABC-1234">
      </div>
      <div>
        <label class="form-label" for="unit_number">Unit Number</label>
        <input type="text" id="unit_number" name="unit_number" value="{{ form_truck.unit_number|default:'' }}" class="form-input" placeholder="e.g. UNIT-001">
      </div>
      <div>
        <label class="form-label" for="truck_type">Truck Type</label>
        <select id="truck_type" name="truck_type" class="form-input">
          {% for value, label in truck_types %}
          <option value="{{ value }}" {% if form_truck and form_truck.truck_type == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="form-label" for="capacity">Capacity (kg)</label>
        <input type="number" id="capacity" name="capacity" step="0.01" value="{{ form_truck.capacity|default:'' }}" class="form-input" placeholder="e.g. 10000">
      </div>
      <div>
        <label class="form-label" for="year_model">Year Model</label>
        <input type="number" id="year_model" name="year_model" value="{{ form_truck.year_model|default:'' }}" class="form-input" placeholder="e.g. 2024">
      </div>
      <div>
        <label class="form-label" for="registration_number">Registration Number</label>
        <input type="text" id="registration_number" name="registration_number" value="{{ form_truck.registration_number|default:'' }}" class="form-input" placeholder="e.g. REG-001">
      </div>
      <div>
        <label class="form-label" for="registration_expiry">Registration Expiry</label>
        <input type="date" id="registration_expiry" name="registration_expiry" value="{{ form_truck.registration_expiry|date:'Y-m-d'|default:'' }}" class="form-input">
      </div>
      <div>
        <label class="form-label" for="insurance_expiry">Insurance Expiry</label>
        <input type="date" id="insurance_expiry" name="insurance_expiry" value="{{ form_truck.insurance_expiry|date:'Y-m-d'|default:'' }}" class="form-input">
      </div>
      <div>
        <label class="form-label" for="status">Status</label>
        <select id="status" name="status" class="form-input">
          {% for value, label in status_choices %}
          <option value="{{ value }}" {% if form_truck and form_truck.status == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="form-label" for="remarks">Remarks</label>
      <textarea id="remarks" name="remarks" rows="3" class="form-input" placeholder="Additional notes...">{{ form_truck.remarks|default:'' }}</textarea>
    </div>
    <div class="flex items-center justify-end space-x-3 mt-6 pt-4 border-t border-gray-200">
      <button type="button" @click="document.body.dispatchEvent(new Event('closeModal', { bubbles: true }))" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary" :disabled="submitting">
        <span x-show="!submitting">{% if form_truck %}Update{% else %}Save{% endif %} Truck</span>
        <span x-show="submitting" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg> Saving...
        </span>
      </button>
    </div>
  </form>
</div>
