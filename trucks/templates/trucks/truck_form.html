{% extends "base.html" %}

{% block title %}{% if truck %}Edit{% else %}Add{% endif %} Truck - Trucking Tracker{% endblock %}

{% block page_title %}{% if truck %}Edit Truck{% else %}Add Truck{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card p-6">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label" for="plate_number">Plate Number</label>
                    <input type="text" id="plate_number" name="plate_number" required
                           value="{{ truck.plate_number|default:'' }}"
                           class="form-input" placeholder="e.g. ABC-1234">
                </div>
                <div>
                    <label class="form-label" for="unit_number">Unit Number</label>
                    <input type="text" id="unit_number" name="unit_number"
                           value="{{ truck.unit_number|default:'' }}"
                           class="form-input" placeholder="e.g. UNIT-001">
                </div>
                <div>
                    <label class="form-label" for="truck_type">Truck Type</label>
                    <select id="truck_type" name="truck_type" class="form-input">
                        {% for value, label in truck_types %}
                        <option value="{{ value }}" {% if truck and truck.truck_type == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="form-label" for="capacity">Capacity (kg)</label>
                    <input type="number" id="capacity" name="capacity" step="0.01"
                           value="{{ truck.capacity|default:'' }}"
                           class="form-input" placeholder="e.g. 10000">
                </div>
                <div>
                    <label class="form-label" for="year_model">Year Model</label>
                    <input type="number" id="year_model" name="year_model"
                           value="{{ truck.year_model|default:'' }}"
                           class="form-input" placeholder="e.g. 2024">
                </div>
                <div>
                    <label class="form-label" for="registration_number">Registration Number</label>
                    <input type="text" id="registration_number" name="registration_number"
                           value="{{ truck.registration_number|default:'' }}"
                           class="form-input" placeholder="e.g. REG-001">
                </div>
                <div>
                    <label class="form-label" for="registration_expiry">Registration Expiry</label>
                    <input type="date" id="registration_expiry" name="registration_expiry"
                           value="{{ truck.registration_expiry|date:'Y-m-d'|default:'' }}"
                           class="form-input">
                </div>
                <div>
                    <label class="form-label" for="insurance_expiry">Insurance Expiry</label>
                    <input type="date" id="insurance_expiry" name="insurance_expiry"
                           value="{{ truck.insurance_expiry|date:'Y-m-d'|default:'' }}"
                           class="form-input">
                </div>
                <div>
                    <label class="form-label" for="status">Status</label>
                    <select id="status" name="status" class="form-input">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if truck and truck.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="form-label" for="remarks">Remarks</label>
                <textarea id="remarks" name="remarks" rows="3" class="form-input" placeholder="Additional notes...">{{ truck.remarks|default:'' }}</textarea>
            </div>
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-100">
                <a href="{% url 'truck_list' %}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">
                    {% if truck %}Update Truck{% else %}Add Truck{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
