<div class="space-y-3">
    {% for trip in trips %}
    <div class="flex items-start space-x-3 pb-3 {% if not forloop.last %}border-b border-gray-100{% endif %}">
        <div class="w-8 h-8 rounded-full bg-[#810B38]/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-[#810B38]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900 truncate">{{ trip.reference_number }}</p>
            <p class="text-xs text-gray-500">{{ trip.pickup_location|truncatechars:30 }} &rarr; {{ trip.dropoff_location|truncatechars:30 }}</p>
            <div class="flex items-center mt-1 space-x-2">
                <span class="badge text-[10px]
                    {% if trip.status == 'delivered' %}bg-green-100 text-green-800
                    {% elif trip.status == 'in_transit' %}bg-blue-100 text-blue-800
                    {% elif trip.status == 'loading' %}bg-yellow-100 text-yellow-800
                    {% elif trip.status == 'scheduled' %}bg-indigo-100 text-indigo-800
                    {% elif trip.status == 'cancelled' %}bg-red-100 text-red-800
                    {% else %}bg-gray-100 text-gray-800{% endif %}">
                    {{ trip.get_status_display }}
                </span>
                <span class="text-[10px] text-gray-400">{{ trip.created_at|timesince }} ago</span>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="empty-state py-4">
        <p class="text-sm text-gray-400">No recent trip activity.</p>
    </div>
    {% endfor %}
</div>
