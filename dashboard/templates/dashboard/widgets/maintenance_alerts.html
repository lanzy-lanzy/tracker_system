<div class="space-y-3">
    {% for alert in alerts %}
    <div class="flex items-start space-x-3 pb-3 {% if not forloop.last %}border-b border-gray-100{% endif %}">
        <div class="w-8 h-8 rounded-full {% if alert.status == 'ongoing' %}bg-red-100{% else %}bg-yellow-100{% endif %} flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 {% if alert.status == 'ongoing' %}text-red-600{% else %}text-yellow-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900 truncate">{{ alert.truck.plate_number }}</p>
            <p class="text-xs text-gray-500">{{ alert.get_maintenance_type_display }} - {{ alert.description|truncatechars:40 }}</p>
            <div class="flex items-center mt-1 space-x-2">
                <span class="badge text-[10px] {% if alert.status == 'ongoing' %}bg-red-100 text-red-800{% else %}bg-yellow-100 text-yellow-800{% endif %}">
                    {{ alert.get_status_display }}
                </span>
                <span class="text-[10px] text-gray-400">Due: {{ alert.service_date|date:"M d, Y" }}</span>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="empty-state py-4">
        <p class="text-sm text-gray-400">No maintenance alerts.</p>
    </div>
    {% endfor %}
</div>
