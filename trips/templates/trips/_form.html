<div class="p-6" x-data="{ submitting: false }">
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-xl font-bold text-[#541A1A]">{% if form_trip %}Edit{% else %}Add New{% endif %} Trip</h3>
    <button @click="document.body.dispatchEvent(new Event('closeModal', { bubbles: true }))" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
  </div>
  {% if error %}<div class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm">{{ error }}</div>{% endif %}
  <form hx-post="{% if pk %}{% url action_url pk=pk %}{% else %}{% url action_url %}{% endif %}" hx-target="#modal-content" hx-swap="innerHTML" @submit="submitting = true">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="form-label" for="client">Client</label>
        <select id="client" name="client" required class="form-input">
          <option value="">Select Client</option>
          {% for c in clients %}
          <option value="{{ c.pk }}" {% if form_trip and form_trip.client_id == c.pk %}selected{% endif %}>{{ c.client_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="form-label" for="assigned_truck">Assigned Truck</label>
        <select id="assigned_truck" name="assigned_truck" class="form-input">
          <option value="">Select Truck</option>
          {% for t in trucks %}
          <option value="{{ t.pk }}" {% if form_trip and form_trip.assigned_truck_id == t.pk %}selected{% endif %}>{{ t.plate_number }} - {{ t.get_truck_type_display }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="form-label" for="assigned_driver">Assigned Driver</label>
        <select id="assigned_driver" name="assigned_driver" class="form-input">
          <option value="">Select Driver</option>
          {% for d in drivers %}
          <option value="{{ d.pk }}" {% if form_trip and form_trip.assigned_driver_id == d.pk %}selected{% endif %}>{{ d.full_name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="pickup_location">Pickup Location</label>
        <textarea id="pickup_location" name="pickup_location" rows="3" required class="form-input">{{ form_trip.pickup_location|default:"" }}</textarea>
      </div>
      <div>
        <label class="form-label" for="dropoff_location">Dropoff Location</label>
        <textarea id="dropoff_location" name="dropoff_location" rows="3" required class="form-input">{{ form_trip.dropoff_location|default:"" }}</textarea>
      </div>
    </div>
    <div>
      <label class="form-label" for="cargo_description">Cargo Description</label>
      <textarea id="cargo_description" name="cargo_description" rows="2" class="form-input">{{ form_trip.cargo_description|default:"" }}</textarea>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="cargo_weight">Cargo Weight (kg)</label>
        <input id="cargo_weight" type="number" step="0.01" name="cargo_weight" value="{{ form_trip.cargo_weight|default:"" }}" class="form-input">
      </div>
      <div>
        <label class="form-label" for="cargo_quantity">Cargo Quantity</label>
        <input id="cargo_quantity" type="number" name="cargo_quantity" value="{{ form_trip.cargo_quantity|default:"" }}" class="form-input">
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="scheduled_pickup">Scheduled Pickup</label>
        <input id="scheduled_pickup" type="datetime-local" name="scheduled_pickup"
               value="{% if form_trip %}{{ form_trip.scheduled_pickup|date:'Y-m-d\\TH:i' }}{% endif %}" required class="form-input">
      </div>
      <div>
        <label class="form-label" for="scheduled_delivery">Scheduled Delivery</label>
        <input id="scheduled_delivery" type="datetime-local" name="scheduled_delivery"
               value="{% if form_trip %}{{ form_trip.scheduled_delivery|date:'Y-m-d\\TH:i' }}{% endif %}" required class="form-input">
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="status">Status</label>
        <select id="status" name="status" class="form-input">
          <option value="pending" {% if form_trip and form_trip.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="scheduled" {% if form_trip and form_trip.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="loading" {% if form_trip and form_trip.status == 'loading' %}selected{% endif %}>Loading</option>
          <option value="in_transit" {% if form_trip and form_trip.status == 'in_transit' %}selected{% endif %}>In Transit</option>
          <option value="delivered" {% if form_trip and form_trip.status == 'delivered' %}selected{% endif %}>Delivered</option>
          <option value="cancelled" {% if form_trip and form_trip.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
      <div>
        <label class="form-label" for="remarks">Remarks</label>
        <textarea id="remarks" name="remarks" rows="3" class="form-input">{{ form_trip.remarks|default:"" }}</textarea>
      </div>
    </div>
    <div class="flex items-center justify-end space-x-3 mt-6 pt-4 border-t border-gray-200">
      <button type="button" @click="document.body.dispatchEvent(new Event('closeModal', { bubbles: true }))" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary" :disabled="submitting">
        <span x-show="!submitting">Save</span>
        <span x-show="submitting">Saving...</span>
      </button>
    </div>
  </form>
</div>
