<div class="relative">
  <div class="h-1.5 bg-gradient-to-r from-[#810B38] to-[#541A1A] rounded-t-2xl"></div>
  <div class="p-6" x-data="{ submitting: false, previewUrl: '{% if user.profile.profile_picture %}{{ user.profile.profile_picture.url }}{% endif %}' }">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-[#810B38]/10 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-[#810B38]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <div>
          <h3 class="text-lg font-bold text-primary">Edit Profile</h3>
          <p class="text-xs text-muted">Update your personal information</p>
        </div>
      </div>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
      <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span class="text-sm text-red-700">{{ error }}</span>
    </div>
    {% endif %}

    <form hx-post="{% url 'profile_edit_modal' %}" hx-target="#modal-content" hx-swap="innerHTML" hx-encoding="multipart/form-data" @submit="submitting = true" class="space-y-6">

      <div class="flex flex-col items-center">
        <div class="relative group">
          <div class="w-24 h-24 rounded-full overflow-hidden bg-surface border-4 border-white shadow-lg">
            <template x-if="previewUrl">
              <img :src="previewUrl" alt="Profile" class="w-full h-full object-cover">
            </template>
            <template x-if="!previewUrl">
              <div class="w-full h-full accent-bg flex items-center justify-center text-white text-3xl font-bold">
                {{ user.first_name|first|default:user.username|first|upper }}
              </div>
            </template>
          </div>
          <label for="profile_picture" class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity duration-200">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </label>
          <input type="file" id="profile_picture" name="profile_picture" accept="image/jpeg,image/png" class="hidden" @change="const f = $event.target.files[0]; if (f) { const r = new FileReader(); r.onload = e => previewUrl = e.target.result; r.readAsDataURL(f) }">
        </div>
        <p class="text-xs text-muted mt-2">Click to change profile picture</p>
      </div>

      <div>
        <h4 class="text-sm font-semibold text-secondary mb-3">Personal Information</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="form-label" for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-input" value="{{ user.first_name }}" placeholder="First name">
          </div>
          <div>
            <label class="form-label" for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-input" value="{{ user.last_name }}" placeholder="Last name">
          </div>
          <div>
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-input" value="{{ user.email }}" placeholder="email@example.com">
          </div>
          <div>
            <label class="form-label" for="phone">Phone</label>
            <input type="text" id="phone" name="phone" class="form-input" value="{{ user.profile.phone|default:'' }}" placeholder="Phone number">
          </div>
        </div>
      </div>

      <div>
        <h4 class="text-sm font-semibold text-secondary mb-3">Address</h4>
        <textarea id="address" name="address" class="form-input" rows="3" placeholder="Enter your address">{{ user.profile.address|default:'' }}</textarea>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-theme">
        <button type="button" @click="document.body.dispatchEvent(new Event('closeModal', { bubbles: true }))" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary inline-flex items-center gap-2" :disabled="submitting">
          <svg x-show="!submitting" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <svg x-show="submitting" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span x-show="!submitting">Save Changes</span>
          <span x-show="submitting">Saving...</span>
        </button>
      </div>
    </form>
  </div>
</div>
