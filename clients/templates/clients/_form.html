{% load humanize %}
<div class="p-6" x-data="{ submitting: false }">
  <div class="flex items-center mb-6">
    <h3 class="text-xl font-bold text-[#541A1A]">{% if form_client %}Edit{% else %}Add New{% endif %} Client</h3>
  </div>
  {% if error %}<div class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm">{{ error }}</div>{% endif %}
  <form hx-post="{% if pk %}{% url action_url pk=pk %}{% else %}{% url action_url %}{% endif %}" hx-target="#modal-content" hx-swap="innerHTML" @submit="submitting = true">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="client_name">Client Name</label>
        <input type="text" id="client_name" name="client_name" required value="{{ form_client.client_name|default:'' }}" class="form-input" placeholder="e.g. Juan Dela Cruz">
      </div>
      <div>
        <label class="form-label" for="company_name">Company Name</label>
        <input type="text" id="company_name" name="company_name" value="{{ form_client.company_name|default:'' }}" class="form-input" placeholder="e.g. ABC Corporation">
      </div>
      <div>
        <label class="form-label" for="contact_person">Contact Person</label>
        <input type="text" id="contact_person" name="contact_person" value="{{ form_client.contact_person|default:'' }}" class="form-input" placeholder="e.g. Maria Santos">
      </div>
      <div>
        <label class="form-label" for="contact_number">Contact Number</label>
        <input type="text" id="contact_number" name="contact_number" required value="{{ form_client.contact_number|default:'' }}" class="form-input" placeholder="e.g. 09171234567">
      </div>
      <div>
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ form_client.email|default:'' }}" class="form-input" placeholder="e.g. client@example.com">
      </div>
    </div>
    <div>
      <label class="form-label" for="address">Address</label>
      <textarea id="address" name="address" rows="2" class="form-input" placeholder="Complete address...">{{ form_client.address|default:'' }}</textarea>
    </div>
    <div>
      <label class="form-label" for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3" class="form-input" placeholder="Additional notes...">{{ form_client.notes|default:'' }}</textarea>
    </div>
    <div class="flex items-center justify-end space-x-3 mt-6 pt-4 border-t border-gray-200">
      <button type="button" @click="document.body.dispatchEvent(new Event('closeModal', { bubbles: true }))" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary" :disabled="submitting">
        <span x-show="!submitting">Save</span>
        <span x-show="submitting">Saving...</span>
      </button>
    </div>
  </form>
</div>
