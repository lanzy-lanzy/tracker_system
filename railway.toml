[build]
builder = "RAILPACK"
buildCommand = "python manage.py collectstatic --noinput"

[deploy]
preDeployCommand = ["python manage.py migrate --noinput && python manage.py seedadmin"]
startCommand = "gunicorn tracker_system.wsgi:application --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
