{% if notification %}
<div id="notification-{{ notification.pk }}" class="px-4 py-3 hover:bg-gray-50 border-b border-gray-50 {% if not notification.is_read %}bg-[#F1E2D1]/20{% endif %}">
    <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0">
            <div class="flex items-center space-x-2 mb-1">
                <span class="badge
                    {% if notification.notification_type == 'info' %}bg-blue-100 text-blue-800
                    {% elif notification.notification_type == 'success' %}bg-green-100 text-green-800
                    {% elif notification.notification_type == 'warning' %}bg-yellow-100 text-yellow-800
                    {% elif notification.notification_type == 'error' %}bg-red-100 text-red-800
                    {% else %}bg-gray-100 text-gray-800{% endif %}">
                    {{ notification.get_notification_type_display }}
                </span>
                {% if not notification.is_read %}
                <span class="w-2 h-2 bg-[#810B38] rounded-full"></span>
                {% endif %}
            </div>
            <p class="text-sm font-medium text-gray-800">{{ notification.title }}</p>
            <p class="text-xs text-gray-500 mt-0.5">{{ notification.message }}</p>
            <p class="text-xs text-gray-400 mt-1">{{ notification.created_at|timesince }} ago</p>
        </div>
        {% if not notification.is_read %}
        <a href="{% url 'notification_mark_read' notification.pk %}"
           class="ml-3 text-xs text-[#810B38] hover:underline whitespace-nowrap"
           hx-get="{% url 'notification_mark_read' notification.pk %}"
           hx-target="#notification-{{ notification.pk }}"
           hx-swap="outerHTML">
            Mark Read
        </a>
        {% endif %}
    </div>
</div>
{% endif %}
